id: io.github.wanglin2.mind-map
runtime: org.freedesktop.Platform
runtime-version: '24.08'
sdk: org.freedesktop.Sdk
base: org.electronjs.Electron2.BaseApp
base-version: '24.08'
command: run.sh
rename-desktop-file: thoughts.desktop
rename-icon: thoughts

finish-args:
  - --share=ipc
  - --socket=x11
  - --device=dri
  - --share=network

modules:
  - name: mind-map
    buildsystem: simple
    build-commands:
      - ar x thoughts.deb
      - tar xf data.tar.xz
      - mv opt/* /app/main
      - mv usr/share/applications usr/share/icons /app/share
      - desktop-file-edit --set-key Exec --set-value "run.sh %U" /app/share/applications/thoughts.desktop
      - mkdir /app/share/metainfo
      - mv /app/main/$FLATPAK_ID.metainfo.xml /app/share/metainfo
      - patch -i metainfo.patch /app/share/metainfo/$FLATPAK_ID.metainfo.xml
      - install -Dm755 -t /app/bin run.sh
    sources:
      - type: file
        only-arches: [x86_64]
        url: https://github.com/wanglin2/mind-map/releases/download/0.18.4/thoughts_0.18.4_amd64.deb
        sha256: 8f0fb42efdefd101c472cd78ba5b93cf11106ad863c5aaeae2009761c5e00bcb
        dest-filename: thoughts.deb
        x-checker-data:
          type: json
          url: https://api.github.com/repos/wanglin2/mind-map/releases/latest
          version-query: .tag_name | sub("^electron-"; "")
          url-query: .assets[] | select(.name=="thoughts_" + $version + "_amd64.deb")
            | .browser_download_url
      - type: file
        only-arches: [aarch64]
        url: https://github.com/wanglin2/mind-map/releases/download/0.18.4/thoughts_0.18.4_arm64.deb
        sha256: 8b169c6688c0c4af7fad50ee56d74d098ec35c3b8d1c719a508962060695a631
        dest-filename: thoughts.deb
        x-checker-data:
          type: json
          url: https://api.github.com/repos/wanglin2/mind-map/releases/latest
          version-query: .tag_name | sub("^electron-"; "")
          url-query: .assets[] | select(.name=="thoughts_" + $version + "_arm64.deb")
            | .browser_download_url
      - type: script
        dest-filename: run.sh
        commands:
          - zypak-wrapper.sh /app/main/thoughts "$@"
      - type: file
        path: metainfo.patch
